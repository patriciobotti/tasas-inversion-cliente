name: Actualizar tasas de inversion

on:
  schedule:
    # Corre de lunes a viernes a las 11:00 UTC (08:00 hora Argentina)
    # El "1-5" son los dias de la semana (1=lunes, 5=viernes), se omiten
    # sabado y domingo ya que los mercados no operan esos dias
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}
    # Permite tambien correrlo manualmente desde la pestaña "Actions" en GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  actualizar-tasas:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Buscar tasas y generar JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python buscar_tasas.py

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
